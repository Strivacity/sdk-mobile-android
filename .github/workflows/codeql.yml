name: "CodeQL"

on:
  push:
    branches:
      - "main"
      - "release-*"
  pull_request:
    branches:
      - "main"
      - "release-*"

jobs:
  analyze:
    name: Analyze
    runs-on: "ubuntu-latest"
    timeout-minutes: 360
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ["java-kotlin"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  dependencies:
    name: Dependencies
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@v6

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Generate and submit dependency graph
        uses: gradle/actions/dependency-submission@v3
        if: github.event.pull_request.head.repo.full_name == github.repository
        env:
          # Do not include test and plugin dependencies in the report
          DEPENDENCY_GRAPH_INCLUDE_CONFIGURATIONS: ".*(annotationProcessor|compileClasspath|productionRuntimeClasspath|runtimeClasspath).*"
          DEPENDENCY_GRAPH_EXCLUDE_PROJECTS: ":buildSrc"

  dependency-review:
    needs: dependencies
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Perform dependency review
        uses: actions/dependency-review-action@v4
        with:
          comment-summary-in-pr: always
          license-check: false
          allow-ghsas: GHSA-gvpg-vgmx-xg6w
